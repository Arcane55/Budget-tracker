<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinTrack - Premium Budget Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        <div class="brand-icon">
          <i class="fas fa-chart-pie"></i>
        </div>
        <div class="brand-text">
          <h1>FinTrack</h1>
          <p>Smart Budget Manager</p>
        </div>
      </div>
      <button id="theme-toggle" class="theme-btn">
        <i class="fas fa-moon"></i>
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="content-wrapper">
      <!-- Dashboard Header -->
      <section class="dashboard-header">
        <div class="header-content">
          <div>
            <h2>Welcome to FinTrack</h2>
            <p>Manage your finances with ease</p>
          </div>
        </div>
      </section>

      <!-- Stats Cards -->
      <section class="stats-grid">
        <div class="stat-card balance-card">
          <div class="card-top">
            <div class="icon-box balance-icon">
              <i class="fas fa-wallet"></i>
            </div>
            <span class="badge-label">Total Balance</span>
          </div>
          <div class="card-bottom">
            <h3 id="balance">$0.00</h3>
            <p class="card-meta">Overall balance</p>
          </div>
        </div>

        <div class="stat-card income-card">
          <div class="card-top">
            <div class="icon-box income-icon">
              <i class="fas fa-arrow-down"></i>
            </div>
            <span class="badge-label">Income</span>
          </div>
          <div class="card-bottom">
            <h3 id="total-income">$0.00</h3>
            <p class="card-meta">Total earned</p>
          </div>
        </div>

        <div class="stat-card expense-card">
          <div class="card-top">
            <div class="icon-box expense-icon">
              <i class="fas fa-arrow-up"></i>
            </div>
            <span class="badge-label">Expenses</span>
          </div>
          <div class="card-bottom">
            <h3 id="total-expenses">$0.00</h3>
            <p class="card-meta">Total spent</p>
          </div>
        </div>
      </section>

      <!-- Alerts -->
      <div id="alerts-section" class="alerts-container"></div>

      <!-- Main Grid -->
      <div class="dashboard-grid">
        <!-- Left Column -->
        <div class="left-column">
          <!-- Add Transaction Card -->
          <div class="premium-card">
            <div class="card-header-premium">
              <h3><i class="fas fa-plus-circle"></i> New Transaction</h3>
            </div>
            <div class="card-body-premium">
              <form id="transaction-form" class="form-premium">
                <div class="form-row-premium">
                  <div class="form-group-premium">
                    <label>Type</label>
                    <div class="input-icon">
                      <i class="fas fa-layer-group"></i>
                      <select id="type" required onchange="updateCategories()">
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                      </select>
                    </div>
                  </div>
                  <div class="form-group-premium">
                    <label>Category</label>
                    <div class="input-icon">
                      <i class="fas fa-tag"></i>
                      <select id="category" required></select>
                    </div>
                  </div>
                </div>
                <div class="form-row-premium">
                  <div class="form-group-premium">
                    <label>Amount</label>
                    <div class="input-icon">
                      <i class="fas fa-dollar-sign"></i>
                      <input type="number" id="amount" placeholder="0.00" step="0.01" required>
                    </div>
                  </div>
                  <div class="form-group-premium">
                    <label>Description</label>
                    <div class="input-icon">
                      <i class="fas fa-pencil-alt"></i>
                      <input type="text" id="description" placeholder="Add notes...">
                    </div>
                  </div>
                </div>
                <button type="submit" class="btn-submit">
                  <span class="btn-text">Add Transaction</span>
                  <i class="fas fa-arrow-right"></i>
                </button>
              </form>
            </div>
          </div>

          <!-- Transactions Card -->
          <div class="premium-card">
            <div class="card-header-premium">
              <h3><i class="fas fa-list-ul"></i> Transactions</h3>
              <div class="header-actions">
                <input type="text" id="search-input" class="search-premium" placeholder="Search...">
                <button id="export-btn" class="btn-icon-premium" title="Export to CSV">
                  <i class="fas fa-download"></i>
                </button>
              </div>
            </div>
            <div class="filter-bar">
              <button id="filter-all" class="filter-btn-premium active">All</button>
              <button id="filter-income" class="filter-btn-premium">
                <i class="fas fa-arrow-down"></i> Income
              </button>
              <button id="filter-expense" class="filter-btn-premium">
                <i class="fas fa-arrow-up"></i> Expense
              </button>
            </div>
            <div class="card-body-premium">
              <div id="transactions-list" class="transactions-premium">
                <div class="empty-state">
                  <i class="fas fa-inbox"></i>
                  <p>No transactions yet</p>
                </div>
              </div>
            </div>
          </div>

          <!-- Monthly Summary Card -->
          <div class="premium-card">
            <div class="card-header-premium">
              <h3><i class="fas fa-chart-line"></i> Monthly Summary</h3>
            </div>
            <div class="card-body-premium">
              <div id="monthly-summary" class="monthly-grid">
                <div class="empty-state">
                  <i class="fas fa-calendar-alt"></i>
                  <p>No data available</p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Right Sidebar -->
        <aside class="right-sidebar">
          <!-- Budget Limits Card -->
          <div class="premium-card sticky-card">
            <div class="card-header-premium">
              <h3><i class="fas fa-bullseye"></i> Budget Limits</h3>
            </div>
            <div class="card-body-premium">
              <form class="form-premium">
                <div class="form-group-premium">
                  <label>Category</label>
                  <div class="input-icon">
                    <i class="fas fa-list"></i>
                    <select id="limit-category" required></select>
                  </div>
                </div>
                <div class="form-group-premium">
                  <label>Limit Amount</label>
                  <div class="input-icon">
                    <i class="fas fa-dollar-sign"></i>
                    <input type="number" id="limit-amount" placeholder="0.00" step="0.01" required>
                  </div>
                </div>
                <button type="button" id="add-limit-btn" class="btn-secondary-premium">
                  <i class="fas fa-check"></i> Set Limit
                </button>
              </form>
            </div>
            <div class="budget-limits-scroll">
              <div id="budget-limits-list" class="budget-list-premium">
                <div class="empty-state">
                  <p>No limits set</p>
                </div>
              </div>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
